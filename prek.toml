[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
priority = 0

[[repos.hooks]]
id = "end-of-file-fixer"
priority = 10

[[repos.hooks]]
id = "check-yaml"
priority = 30

[[repos.hooks]]
id = "check-json"
priority = 30

[[repos.hooks]]
id = "check-toml"
priority = 30

[[repos.hooks]]
id = "check-added-large-files"
priority = 30

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.9.24"

[[repos.hooks]]
id = "uv-lock"
priority = 20

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.3"

[[repos.hooks]]
id = "check-dependabot"
priority = 30

[[repos.hooks]]
id = "check-github-workflows"
priority = 30

[[repos.hooks]]
id = "check-github-actions"
priority = 30

[[repos.hooks]]
id = "check-compose-spec"
priority = 30

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"

[[repos.hooks]]
id = "actionlint"
additional_dependencies = [
    "github.com/wasilibs/go-shellcheck/cmd/shellcheck@latest",
]
priority = 30

[[repos]]
repo = "https://github.com/woodruffw/zizmor-pre-commit"
rev = "v1.26.1"

[[repos.hooks]]
id = "zizmor"
args = ["--no-progress"]
priority = 30

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"

[[repos.hooks]]
id = "codespell"
args = [
    "--skip=uv.lock,htmlcov,.mypy_cache,.pytest_cache,.ruff_cache,.venv,site",
]
priority = 30

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-check"
name = "ruff check fix"
alias = "ruff-check-fix"
language = "system"
entry = "uv run ruff check --fix-only ."
stages = ["manual"]
pass_filenames = false
priority = 20

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
alias = "ruff-format-fix"
language = "system"
entry = "uv run ruff format ."
stages = ["manual"]
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "ruff-format"
name = "ruff format check"
alias = "ruff-format-check"
language = "system"
entry = "uv run ruff format --check ."
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^ruff\\.toml$|^setup\\.cfg$|^prek\\.toml$|^uv\\.lock$"
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
language = "system"
entry = "uv run ruff check ."
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^ruff\\.toml$|^setup\\.cfg$|^prek\\.toml$|^uv\\.lock$"
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "flake8"
name = "wemake-python-styleguide"
language = "system"
entry = "uv run flake8 src management"
files = "^(src|management)/.*\\.py$|^setup\\.cfg$|^pyproject\\.toml$|^uv\\.lock$"
pass_filenames = false
priority = 30

[[repos.hooks]]
id = "mypy"
name = "mypy"
language = "system"
entry = "uv run --env-file .env.test.example mypy src/ management/ tests/"
files = "^(src|management|tests)/.*\\.py$|^pyproject\\.toml$|^setup\\.cfg$|^prek\\.toml$|^uv\\.lock$|^\\.env\\.test\\.example$"
pass_filenames = false
priority = 30

name: Lint and Test

on:
  push:
    branches: [ main ]
  pull_request: { }

permissions:
  contents: read

jobs:
  check-code:
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker/docker-compose.yaml:docker/docker-compose.test.yaml
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: "Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-groups

      - name: Create .env
        run: |
          cp .env.test.example .env
          {
            echo 'POSTGRES_USER=postgres'
            echo 'POSTGRES_DB=fastapi_template'
            echo 'POSTGRES_PASSWORD=test-postgres-password'
            echo 'POSTGRES_PORT=5432'
            echo 'REDIS_PASSWORD=example-redis-password'
            echo 'REDIS_PORT=6379'
          } >> .env

      - name: Run linters
        run: make lint

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2
        with:
          version: v5.1.3

      - name: Build Docker image
        run: docker compose build base

      - name: Start infrastructure
        run: |
          docker compose up -d postgres pgbouncer redis

      - name: Run tests
        run: make test

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color || true

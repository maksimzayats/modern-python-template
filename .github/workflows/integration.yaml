name: Integration Health Check

on:
  push:
    branches: [ main ]
  pull_request: { }

permissions:
  contents: read

jobs:
  integration-health-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: production
            compose-file: docker/docker-compose.yaml
          - name: local
            compose-file: docker/docker-compose.yaml:docker/docker-compose.local.yaml
    name: integration-health-check (${{ matrix.name }})
    env:
      COMPOSE_FILE: ${{ matrix.compose-file }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2
        with:
          version: v5.1.3

      - name: Copy environment file
        run: cp .env.example .env

      - name: Build Docker base image
        run: docker compose build base

      - name: Start API
        run: docker compose up api -d

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8009/api/v1/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color || true
